# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node / Angular Build 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
    steps:   
    - name: My Location
      run : echo '${{runner.workspace}}'
      
    - name: My Location2 git
      run :  ${{github.workspace}}
     
    - name: My Location Temp
      run :  ${{runner.temp}}
      
    - uses: actions/checkout@v4
    
    - name: Restore Project Packages     
      run: npm install

    - name: Get typescript package     
      run: npm install -g typescript

    - name: Get Angular CLI     
      run: npm install -g @angular/cli
      
    - name: Build Angular Artifact     
      run: ng build
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
       name: archive.zip
       path: '${{github.workspace}}\dist\PM_APP\browser'
